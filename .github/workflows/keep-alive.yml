name: Keep Alive

on:
  schedule:
    # Daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run keep-alive script
        env:
          # override this if needed
          SPACE_URL: https://siqvitor-argus.hf.space
        run: |
          set -euo pipefail
          # run the script from inside the genai_agent folder where it lives
          python genai_agent/scripts/keep_alive.py
